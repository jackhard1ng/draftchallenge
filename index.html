<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Draft Challenge — 2026 NCAA Tournament</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-283612F8EV"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-283612F8EV');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3297756335885716" crossorigin="anonymous"></script>
<style>
/*  ╔═══════════════════════════════════════════════════════╗
    ║  BROADCAST SCOREBOARD — Dense, data-driven, premium  ║
    ╚═══════════════════════════════════════════════════════╝ */
:root{
  --black:#0a0a0c;--d1:#101114;--d2:#16171c;--d3:#1c1d24;--d4:#24252e;--d5:#2e303a;
  --g1:#4a4d5e;--g2:#6e7186;--g3:#9698a8;--g4:#c0c2cc;--white:#ecedf2;
  --fire:#ff4d1a;--fire-dim:#b83a14;--fire-bg:rgba(255,77,26,.07);
  --gold:#ffb800;--gold-dim:#a87a00;--gold-bg:rgba(255,184,0,.06);
  --mint:#00d68f;--mint-dim:#009964;--mint-bg:rgba(0,214,143,.06);
  --sky:#2196f3;--sky-bg:rgba(33,150,243,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── TYPE SYSTEM ── */
.t-head{font-family:'Chakra Petch',sans-serif;font-weight:700;text-transform:uppercase}
.t-data{font-family:'IBM Plex Mono',monospace}
.t-label{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--g2)}

/* ── TOP BAR — broadcast ticker feel ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem;background:var(--d1);border-bottom:2px solid var(--fire);
  position:sticky;top:0;z-index:100;
}
.topbar .logo{
  font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1rem;
  color:var(--fire);letter-spacing:.04em;text-transform:uppercase;
  display:flex;align-items:center;gap:.4rem;
}
.topbar .logo span{
  font-size:.55rem;color:var(--g2);letter-spacing:.1em;font-weight:500;
  border:1px solid var(--d4);padding:.1rem .35rem;border-radius:2px;
}
.topbar .nav-items{display:flex;gap:0}
.topbar .ni{
  font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:.72rem;
  letter-spacing:.06em;text-transform:uppercase;
  padding:.4rem .7rem;color:var(--g2);background:none;border:none;
  border-bottom:2px solid transparent;transition:all .15s;
  margin-bottom:-2px;
}
.topbar .ni:hover{color:var(--white)}
.topbar .ni.on{color:var(--fire);border-bottom-color:var(--fire)}
.topbar .ni.adm{color:var(--gold)}
.topbar .ni.adm.on{color:var(--gold);border-bottom-color:var(--gold)}
.topbar .back{
  font-size:.7rem;color:var(--g2);background:none;border:1px solid var(--d4);
  padding:.25rem .5rem;font-family:'IBM Plex Sans',sans-serif;font-weight:600;
  transition:all .12s;
}
.topbar .back:hover{color:var(--fire);border-color:var(--fire)}

/* ── PANELS ── */
.pnl{display:none;max-width:960px;margin:0 auto;padding:.6rem .8rem}.pnl.on{display:block}

/* ── BUTTONS ── */
.b-fire{background:var(--fire);color:#fff;border:none;padding:.45rem 1.2rem;font-weight:700;font-size:.8rem;letter-spacing:.03em;transition:all .12s;font-family:'IBM Plex Sans',sans-serif}
.b-fire:hover{filter:brightness(1.15);transform:translateY(-1px)}
.b-out{background:none;border:1px solid var(--d5);color:var(--g3);padding:.35rem .8rem;font-size:.75rem;font-weight:600;transition:all .12s;font-family:'IBM Plex Sans',sans-serif}
.b-out:hover{border-color:var(--fire);color:var(--fire)}
.b-mint{background:var(--mint);color:var(--black);border:none;padding:.3rem .7rem;font-weight:700;font-size:.7rem;font-family:'IBM Plex Sans',sans-serif}
.b-red{background:var(--fire);color:#fff;border:none;padding:.3rem .7rem;font-weight:700;font-size:.7rem;font-family:'IBM Plex Sans',sans-serif}
.b-dim{background:var(--d3);color:var(--g2);border:none;padding:.25rem .5rem;font-size:.65rem;font-family:'IBM Plex Sans',sans-serif}
.inp{background:var(--d2);border:1px solid var(--d4);color:var(--white);padding:.45rem .7rem;font-size:.85rem;outline:none;width:100%;font-family:'IBM Plex Sans',sans-serif;transition:border .15s}
.inp:focus{border-color:var(--fire)}

/* ═══ GATE (Login / Join) ═══ */
.gate{max-width:420px;margin:0 auto;padding:2rem 1rem}
.gate-brand{text-align:center;margin-bottom:1.5rem}
.gate-brand h1{font-family:'Chakra Petch',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;color:var(--fire);text-transform:uppercase;line-height:.95;letter-spacing:.02em}
.gate-brand .sub{color:var(--g2);font-size:.75rem;margin-top:.3rem}
.gate-brand hr{border:none;height:2px;background:linear-gradient(90deg,transparent,var(--fire),transparent);margin:.8rem 0;opacity:.3}
.gate-section{margin-bottom:1.5rem}
.gate-section .gs-title{font-family:'Chakra Petch',sans-serif;font-size:.8rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;padding-bottom:.25rem;border-bottom:1px solid var(--d3)}
.gate-section .inp{margin-bottom:.4rem}
.gate-section .b-fire{width:100%;margin-top:.2rem}
.gate-row{display:flex;gap:.4rem}
.gate-row .inp{flex:1}

/* ═══ MY GROUPS ═══ */
.my-groups{margin-bottom:1.2rem}
.mg-title{font-family:'Chakra Petch',sans-serif;font-size:.7rem;color:var(--g2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem}
.mg-card{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem .65rem;background:var(--d1);border-left:3px solid var(--d5);
  margin-bottom:2px;cursor:pointer;transition:all .12s;
}
.mg-card:hover{background:var(--d2);border-left-color:var(--fire)}
.mg-card .mc-name{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.85rem;flex:1}
.mg-card .mc-code{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--g1);letter-spacing:.1em}
.mg-card .mc-status{font-family:'IBM Plex Mono',monospace;font-size:.58rem;padding:.12rem .35rem;border-radius:2px;font-weight:600}
.mc-status.waiting{color:var(--sky);background:var(--sky-bg)}
.mc-status.drafting{color:var(--gold);background:var(--gold-bg)}
.mc-status.complete{color:var(--mint);background:var(--mint-bg)}
.mg-card .mc-del{color:var(--g1);font-size:.6rem;padding:.15rem .3rem;background:none;border:1px solid var(--d4);transition:all .12s;opacity:0}
.mg-card:hover .mc-del{opacity:1}
.mg-card .mc-del:hover{color:var(--fire);border-color:var(--fire)}

/* Editable draft order */
.order-edit{display:flex;flex-direction:column;gap:2px;max-width:300px;margin:.5rem auto}
.oe-row{display:flex;align-items:center;gap:.3rem;background:var(--d1);padding:.25rem .4rem;border-left:2px solid var(--d4)}
.oe-row .oe-num{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--g1);min-width:18px}
.oe-row .oe-name{flex:1;font-size:.78rem;font-weight:600}
.oe-row .oe-btn{background:none;border:1px solid var(--d4);color:var(--g2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .1s;padding:0}
.oe-row .oe-btn:hover{color:var(--fire);border-color:var(--fire)}

/* Shuffle animation overlay */
.shuffle-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(10,10,12,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.shuffle-overlay .so-title{font-family:'Chakra Petch',sans-serif;font-size:1rem;color:var(--g2);text-transform:uppercase;letter-spacing:.2em;margin-bottom:1rem}
.shuffle-slots{display:flex;flex-direction:column;gap:4px;min-width:200px}
.shuffle-slot{
  font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1rem;
  padding:.5rem .8rem;background:var(--d2);border-left:3px solid var(--fire);
  text-transform:uppercase;display:flex;align-items:center;gap:.5rem;
  transition:all .15s;
}
.shuffle-slot .ss-num{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--g1);min-width:20px}
.shuffle-slot.locked{border-left-color:var(--mint);background:var(--mint-bg)}
@keyframes slotCycle{0%{transform:translateY(0)}50%{transform:translateY(-3px)}100%{transform:translateY(0)}}

/* ═══ WAITING ROOM ═══ */
.wr-top{text-align:center;padding:.8rem 0;border-bottom:1px solid var(--d3);margin-bottom:.6rem}
.wr-top .wt-name{font-family:'Chakra Petch',sans-serif;font-size:1.3rem;font-weight:700;text-transform:uppercase}
.wr-top .wt-code{font-family:'IBM Plex Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--mint);letter-spacing:.3em;margin:.2rem 0}
.wr-top .wt-meta{font-size:.7rem;color:var(--g2)}
.wr-row{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center;margin:.6rem 0}
.wr-tag{background:var(--d2);border:1px solid var(--d4);padding:.25rem .6rem;font-size:.75rem;font-weight:500;display:flex;align-items:center;gap:.25rem}
.wr-tag.com{border-color:var(--gold);color:var(--gold)}
.wr-tag .dot{width:5px;height:5px;border-radius:50%;background:var(--mint)}
.wr-ctrl{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin:.6rem 0}
.wr-strip{display:flex;gap:1px;justify-content:center;flex-wrap:wrap;margin:.5rem 0}
.wr-pip{background:var(--d2);border:1px solid var(--d3);padding:.15rem .4rem;font-family:'IBM Plex Mono',monospace;font-size:.62rem;text-align:center;color:var(--g2)}
.wr-settings{display:flex;gap:.5rem;align-items:center;justify-content:center;margin:.5rem 0;flex-wrap:wrap}
.wr-settings label{font-size:.65rem;color:var(--g2);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.wr-settings select{background:var(--d2);border:1px solid var(--d4);color:var(--white);padding:.25rem .4rem;font-size:.78rem;font-family:'IBM Plex Mono',monospace;outline:none}

/* ═══ DRAFT ROOM ═══ */
/* On-The-Clock strip */
.otc{background:var(--d1);border-bottom:1px solid var(--d3);padding:.5rem .6rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.otc.live{border-bottom-color:var(--fire);background:var(--fire-bg)}
.otc.done{border-bottom-color:var(--mint);background:var(--mint-bg)}
/* Clock */
.otc-clock{position:relative;width:56px;height:56px;flex-shrink:0}
.otc-clock svg{width:100%;height:100%;transform:rotate(-90deg)}
.otc-clock .rc-bg{fill:none;stroke:var(--d4);stroke-width:4}
.otc-clock .rc-fg{fill:none;stroke:var(--fire);stroke-width:4;stroke-linecap:butt;transition:stroke-dashoffset .15s linear}
.otc-clock.crit .rc-fg{stroke:var(--fire);animation:blink .35s infinite alternate}
@keyframes blink{0%{opacity:1}100%{opacity:.2}}
.otc-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-size:1.5rem;font-weight:700;color:var(--fire)}
.otc-clock.crit .otc-num{color:var(--fire)}
.otc-info{flex:1;min-width:0}
.otc-info .oi-rd{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--g2);letter-spacing:.06em}
.otc-info .oi-who{font-family:'Chakra Petch',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase;line-height:1.1}
.otc.live .oi-who{color:var(--fire)}
.otc.done .oi-who{color:var(--mint)}
.otc-info .oi-stats{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--g1)}
.otc-badge{font-family:'Chakra Petch',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.2rem .5rem;border:1px solid var(--fire);color:var(--fire);white-space:nowrap}

/* Draft grid */
.draft-grid{display:grid;grid-template-columns:1fr 220px;gap:.4rem}
@media(max-width:700px){.draft-grid{grid-template-columns:1fr}.d-log{max-height:220px}}

/* Filter tabs */
.ftabs{display:flex;gap:1px;margin-bottom:.35rem;background:var(--d3)}
.ft{font-family:'IBM Plex Sans',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.3rem .55rem;background:var(--d1);color:var(--g2);border:none;flex:1;text-align:center;transition:all .1s}
.ft:hover{color:var(--white)}.ft.on{color:var(--fire);background:var(--d2);box-shadow:inset 0 -2px 0 var(--fire)}

/* Team board */
.t-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:2px;max-height:56vh;overflow-y:auto}
.tc{
  display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:.3rem;
  padding:.3rem .4rem;background:var(--d1);border-left:2px solid var(--d3);
  cursor:pointer;transition:all .1s;min-height:32px;
}
.tc:hover:not(.gone):not(.off){border-left-color:var(--fire);background:var(--d2)}
.tc.gone{opacity:.15;pointer-events:none}.tc.gone .tc-n{text-decoration:line-through}
.tc.off{opacity:.3;pointer-events:none}
.tc.mine{border-left-color:var(--mint);background:var(--mint-bg)}
.tc.mine .tc-n{color:var(--mint)}
.tc .tc-s{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:.8rem;color:var(--g2);text-align:center}
.tc .tc-n{font-size:.72rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc .tc-r{font-size:.5rem;color:var(--g1)}
.tc .tc-v{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--gold)}
.tc .tc-o{font-size:.48rem;color:var(--g1)}

/* Draft log */
.d-log{background:var(--d1);overflow-y:auto;max-height:56vh;border-left:1px solid var(--d3)}
.d-log .dl-h{font-size:.6rem;color:var(--g2);text-align:center;padding:.35rem;border-bottom:1px solid var(--d3);font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.dl-row{display:grid;grid-template-columns:22px 1fr;gap:.25rem;padding:.2rem .3rem;border-bottom:1px solid var(--d2);font-size:.65rem}
.dl-row .dl-n{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--g1);text-align:right;padding-top:.05rem}
.dl-row .dl-p{font-weight:600;color:var(--gold);font-size:.62rem}
.dl-row .dl-t{color:var(--g3);font-size:.62rem}
.dl-row .dl-a{color:var(--fire);font-size:.5rem;font-style:italic}

/* ═══ STANDINGS ═══ */
.st{max-width:560px;margin:0 auto}
.st .st-h{font-family:'Chakra Petch',sans-serif;font-size:1.1rem;text-transform:uppercase;color:var(--mint);text-align:center;margin-bottom:.5rem;letter-spacing:.04em}
.sr{display:flex;align-items:center;padding:.45rem .55rem;background:var(--d1);border-left:3px solid var(--d3);margin-bottom:2px;gap:.5rem}
.sr.top{border-left-color:var(--gold);background:var(--gold-bg)}
.sr .sr-rk{font-family:'Chakra Petch',sans-serif;font-size:1.1rem;color:var(--g2);min-width:22px;text-align:center}
.sr.top .sr-rk{color:var(--gold)}
.sr .sr-nm{flex:1;font-weight:600;font-size:.85rem}
.sr .sr-pt{font-family:'Chakra Petch',sans-serif;font-size:1.05rem;color:var(--mint);min-width:30px;text-align:right}

/* ═══ ROSTERS ═══ */
.rost-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:3px}
.rost{background:var(--d1);padding:.5rem;position:relative}
.rost .ro-bar{position:absolute;top:0;left:0;right:0;height:2px}
.rost .ro-nm{font-family:'Chakra Petch',sans-serif;font-size:.85rem;font-weight:700;text-transform:uppercase;margin-bottom:.35rem;letter-spacing:.02em}
.rost .ro-tm{display:flex;align-items:center;gap:.3rem;padding:.15rem 0;border-bottom:1px solid var(--d2);font-size:.7rem}
.rost .ro-tm:last-of-type{border-bottom:none}
.rost .ro-tm .rs{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--g1);min-width:16px;text-align:center}
.rost .ro-tm .rn{flex:1;font-weight:500}
.rost .ro-tm .rp{font-family:'Chakra Petch',sans-serif;font-size:.78rem;color:var(--mint)}
.rost .ro-tm.dead{opacity:.25;text-decoration:line-through}
.rost .ro-tot{display:flex;justify-content:space-between;padding-top:.3rem;margin-top:.15rem;border-top:1px solid var(--d4);font-family:'Chakra Petch',sans-serif;font-size:.85rem;font-weight:700;color:var(--gold)}

/* ═══ BRACKET VIEW ═══ */
.ow-legend{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin:.4rem 0}
.ow-tag{font-size:.6rem;font-weight:600;padding:.12rem .35rem}
.bv-r{margin-bottom:1rem}
.bv-r h3{font-family:'Chakra Petch',sans-serif;font-size:.85rem;color:var(--fire);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;text-align:center}
.bv-g{display:flex;flex-direction:column;gap:1px;margin-bottom:3px}
.bv-t{display:flex;align-items:center;gap:.25rem;padding:.18rem .35rem;background:var(--d1);border-left:2px solid var(--d3);font-size:.65rem;min-height:22px}
.bv-t .vs{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--g1);min-width:12px;text-align:center}
.bv-t .vn{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.65rem}
.bv-t .vo{font-size:.48rem;padding:.08rem .2rem;font-weight:600}
.bv-t.w{border-left-color:var(--mint);background:var(--mint-bg)}
.bv-t.l{opacity:.2}

/* ═══ ADMIN ═══ */
.adm-panel{max-width:660px;margin:0 auto}
.adm-panel .adm-h{font-family:'Chakra Petch',sans-serif;font-size:1rem;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:.15rem}
.adm-panel .adm-sub{font-size:.68rem;color:var(--g2);text-align:center;margin-bottom:.6rem}
.adm-rd{margin-bottom:.8rem}
.adm-rd h3{font-family:'Chakra Petch',sans-serif;font-size:.78rem;color:var(--fire);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
.adm-row{display:flex;align-items:center;gap:.3rem;padding:.2rem 0;border-bottom:1px solid var(--d2);font-size:.7rem;flex-wrap:wrap}
.adm-row .ai-info{color:var(--g1);font-size:.6rem;min-width:50px;font-family:'IBM Plex Mono',monospace}
.adm-row .ai-nm{flex:1;font-weight:600}
.adm-row .ai-pt{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--gold)}
/* Matchup admin */
.adm-mu{display:flex;gap:2px;margin-bottom:3px;align-items:stretch}
.adm-mu .am-team{flex:1;display:flex;align-items:center;gap:.3rem;padding:.3rem .4rem;background:var(--d1);border:1px solid var(--d3);cursor:pointer;transition:all .12s;font-size:.72rem}
.adm-mu .am-team:hover{border-color:var(--mint);background:var(--mint-bg)}
.adm-mu .am-team.won{border-color:var(--mint);background:var(--mint-bg);font-weight:700}
.adm-mu .am-team.lost{opacity:.25;border-color:var(--d3)}
.adm-mu .am-team .ams{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:.75rem;color:var(--g2);min-width:16px;text-align:center}
.adm-mu .am-team .amn{flex:1;font-weight:600}
.adm-mu .am-team .amp{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--gold)}
.adm-mu .am-vs{font-size:.5rem;color:var(--g1);display:flex;align-items:center;padding:0 .2rem}
.adm-undo{font-size:.55rem;color:var(--g2);background:none;border:1px solid var(--d4);padding:.15rem .3rem;margin-left:.2rem;transition:all .1s}
.adm-undo:hover{color:var(--fire);border-color:var(--fire)}
/* Pre-draft chat */
.chat-box{background:var(--d1);border:1px solid var(--d3);padding:.4rem;margin-top:.5rem;max-height:200px;overflow-y:auto}
.chat-msg{font-size:.7rem;padding:.15rem 0;border-bottom:1px solid var(--d2)}
.chat-msg .cm-name{font-weight:600;color:var(--gold);margin-right:.3rem}
.chat-msg .cm-text{color:var(--g3)}
.chat-input{display:flex;gap:.3rem;margin-top:.3rem}
.chat-input .inp{font-size:.78rem;padding:.3rem .5rem}
.chat-input button{padding:.3rem .6rem;font-size:.72rem}

/* ═══ SCORING REF ═══ */
.sref{background:var(--d1);padding:.5rem;margin-top:.8rem;border-top:1px solid var(--d3)}

// When user enters their name, we search Firebase for all groups containing that player ID
function findMyGroups(myId,cb){
  db.ref("groups").once("value",snap=>{
    const all=snap.val()||{};
    const found=[];
    for(const[gid,g] of Object.entries(all)){
      if(g.players&&g.players[myId]){
        found.push({gid,name:g.name,code:g.code,status:g.status,size:g.size,playerCount:Object.keys(g.players).length});
      }
    }
    cb(found);
  });
}

function genCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

function createGroup(){
  const nm=document.getElementById("gateName")?.value.trim();
  if(!nm)return alert("Enter your name first");
  const gn=document.getElementById("cName")?.value.trim()||"Draft Group";
  const sz=parseInt(document.getElementById("cSize")?.value||8);
  const timer=parseInt(document.getElementById("cTimer")?.value||30);
  S.myName=nm;S.me=nm.toLowerCase().replace(/[^a-z0-9]/g,"_");
  localStorage.setItem("dg_name",nm);
  const code=genCode(),gid=code.toLowerCase();
  db.ref(`groups/${gid}`).set({
    code,name:gn,size:sz,timer,commissioner:S.me,status:"waiting",
    players:{[S.me]:{name:nm,joinedAt:Date.now(),order:0}},
    draftState:{currentPick:0,picks:{},startedAt:null,timerEnd:null,paused:false}
  }).then(()=>enterGroup(gid));
}

function joinGroup(){
  const nm=document.getElementById("gateName")?.value.trim();
  if(!nm)return alert("Enter your name first");
  const code=(document.getElementById("jCode")?.value||"").trim().toUpperCase();
  if(code.length!==6)return alert("Enter a valid 6-letter code");
  S.myName=nm;S.me=nm.toLowerCase().replace(/[^a-z0-9]/g,"_");
  localStorage.setItem("dg_name",nm);
  const gid=code.toLowerCase();
  db.ref(`groups/${gid}`).once("value",snap=>{
    const g=snap.val();
    if(!g)return alert("Group not found.");
    if(g.status!=="waiting"&&!g.players?.[S.me])return alert("Draft already started.");
    const pc=Object.keys(g.players||{}).length;
    if(pc>=g.size&&!g.players?.[S.me])return alert("Group is full.");
    if(!g.players?.[S.me])db.ref(`groups/${gid}/players/${S.me}`).set({name:nm,joinedAt:Date.now(),order:pc});
    enterGroup(gid);
  });
}

function enterGroup(gid){
  if(S.listener)db.ref(`groups/${S.gid}`).off("value",S.listener);
  if(S.gid)db.ref(`groups/${S.gid}/chat`).off();
  S.gid=gid;S.tab="draft";S.filter="all";
  S.listener=db.ref(`groups/${gid}`).on("value",snap=>{S.group=snap.val();if(S.group)render();});
  listenChat();
}

function moveOrder(idx,dir){
  const order=[...(S.group.draftState?.order||Object.keys(S.group.players))];
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=order.length)return;
  [order[idx],order[newIdx]]=[order[newIdx],order[idx]];
  db.ref(`groups/${S.gid}/draftState/order`).set(order);
}

// Animated shuffle then start
function shuffleAndStart(){
  const g=S.group;
  if(Object.keys(g.players).length<2)return;
  const players=Object.keys(g.players);
  const names={};for(const pid of players)names[pid]=g.players[pid].name;
  
  // Create overlay
  const overlay=document.createElement("div");
  overlay.className="shuffle-overlay";
  let oh=`<div class="so-title">Randomizing Draft Order</div><div class="shuffle-slots" id="shuffleSlots">`;
  players.forEach((_,i)=>oh+=`<div class="shuffle-slot" id="ss${i}"><span class="ss-num">${i+1}</span><span id="ssn${i}">...</span></div>`);
  oh+=`</div>`;
  overlay.innerHTML=oh;
  document.body.appendChild(overlay);

  // Animate: rapid cycling of names for 2.5 seconds then lock one by one
  let finalOrder=[...players].sort(()=>Math.random()-.5);
  let locked=0;
  const totalSlots=players.length;
  const cycleSpeed=80;
  let elapsed=0;
  
  const interval=setInterval(()=>{
    elapsed+=cycleSpeed;
    // Cycle unlocked slots with random names
    for(let i=locked;i<totalSlots;i++){
      const el=document.getElementById(`ssn${i}`);
      if(el)el.textContent=names[players[Math.floor(Math.random()*players.length)]];
    }
    
    // Lock slots one at a time after initial shuffle period
    if(elapsed>1500&&elapsed%(Math.max(300,600-locked*100))<cycleSpeed){
      if(locked<totalSlots){
        const el=document.getElementById(`ssn${locked}`);
        const slot=document.getElementById(`ss${locked}`);
        if(el)el.textContent=names[finalOrder[locked]];
        if(slot)slot.classList.add("locked");
        locked++;
      }
    }
    
    // Done
    if(locked>=totalSlots){
      clearInterval(interval);
      setTimeout(()=>{
        overlay.remove();
        // Save order and start draft
        const timer=g.timer||30;
        const tpp=Math.floor(T.length/g.size),tot=tpp*g.size,now=Date.now();
        db.ref(`groups/${S.gid}`).update({
          status:"drafting",
          "draftState/order":finalOrder,
          "draftState/currentPick":0,"draftState/totalPicks":tot,"draftState/teamsPerPlayer":tpp,
          "draftState/startedAt":now,"draftState/timerEnd":now+timer*1000,"draftState/paused":false
        });
      },800);
    }
  },cycleSpeed);
}

  const gone=new Set();const owners={};

    if(isCom)h+=`<button class="b-out" onclick="pauseDraft()" style="font-size:.65rem;padding:.2rem .5rem">${ds.paused?'\u25B6':'\u23F8'}</button>`;
  }else if(done){
    h+=`<div class="otc-info"><div class="oi-rd">${tot} picks complete</div><div class="oi-who">Draft Complete</div></div>`;
    if(isCom&&g.status!=="complete")h+=`<button class="b-mint" onclick="finalize()">Finalize</button>`;
    if(isCom)h+=`<button class="b-out" onclick="restartDraft()" style="font-size:.62rem">\u21BB Restart</button>`;

  h+=`<div class="draft-grid"><div class="t-board">`;
  T.filter(t=>{if(S.filter==="avail")return!gone.has(t.id);if(S.filter==="mine")return owners[t.id]===S.me;if(S.filter!=="all")return t.region===S.filter;return true;})
  .sort((a,b)=>a.seed-b.seed||a.region.localeCompare(b.region)).forEach(t=>{
    const g2=gone.has(t.id),can=myTurn&&live&&!g2&&!ds.paused;
    const oName=owners[t.id]?g.players[owners[t.id]]?.name:"";
    const isMine=owners[t.id]===S.me;
    h+=`<div class="tc ${g2?'gone':''} ${!can&&!g2?'off':''} ${g2&&isMine?'mine':''}" ${can?`onclick="pick('${t.id}')"`:''}>
<span class="tc-s">${t.seed}</span><div><div class="tc-n">${t.name}</div><div class="tc-r">${t.region}</div>${g2?`<div class="tc-o">${oName}</div>`:''}</div>
<span class="tc-v">${SP[t.seed]}pt</span></div>`;
  });

  Object.entries(picks).sort((a,b)=>parseInt(b[0])-parseInt(a[0])).forEach(([n,pk])=>{const t=T.find(x=>x.id===pk.teamId);
    h+=`<div class="dl-row"><span class="dl-n">${parseInt(n)+1}</span><div><span class="dl-p">${g.players[pk.playerId]?.name||pk.playerId}</span> <span class="dl-t">(${t?.seed}) ${t?.name||'?'}</span>${pk.auto?'<span class="dl-a"> auto</span>':''}</div></div>`;

function sf(f){S.filter=f;rDraft();}
function startClk(te,timer){
  if(S.ti)clearInterval(S.ti);const circ=2*Math.PI*24;
  S.ti=setInterval(()=>{
    const el=document.getElementById("clkN"),ring=document.getElementById("rFg"),wrap=document.getElementById("clk");
    if(!el){clearInterval(S.ti);return;}
    const left=Math.max(0,Math.ceil((te-Date.now())/1000));
    el.textContent=left;ring.style.strokeDashoffset=circ-(left/timer)*circ;
    if(left<=5)wrap?.classList.add("crit");else wrap?.classList.remove("crit");
    if(left<=0){clearInterval(S.ti);const g=S.group,ds=g?.draftState;if(!ds||ds.paused)return;
      const order=ds.order||[],cp=ds.currentPick||0,idx=cp%order.length,rd=Math.floor(cp/order.length);
      const ai=rd%2===0?idx:(order.length-1-idx);
      if(order[ai]===S.me||S.me===g.commissioner)autoPick();}
  },200);
}

function autoPick(){
  const g=S.group,ds=g.draftState,picks=ds.picks||{},timer=g.timer||30;
  const gone=new Set(Object.values(picks).map(p=>p.teamId));
  const avail=T.filter(t=>!gone.has(t.id));if(!avail.length)return;
  const t=avail[Math.floor(Math.random()*avail.length)];
  const order=ds.order,cp=ds.currentPick,idx=cp%order.length,rd=Math.floor(cp/order.length);
  const ai=rd%2===0?idx:(order.length-1-idx);const nc=cp+1;
  const up={[`picks/${cp}`]:{teamId:t.id,playerId:order[ai],auto:true,ts:Date.now()},currentPick:nc};
  if(nc<ds.totalPicks)up.timerEnd=Date.now()+timer*1000;
  db.ref(`groups/${S.gid}/draftState`).update(up);
  if(nc>=ds.totalPicks)db.ref(`groups/${S.gid}/status`).set("complete");
}

function pick(tid){
  const g=S.group,ds=g.draftState,timer=g.timer||30;if(!ds||g.status!=="drafting")return;
  const order=ds.order,cp=ds.currentPick,idx=cp%order.length,rd=Math.floor(cp/order.length);
  const ai=rd%2===0?idx:(order.length-1-idx);
  if(order[ai]!==S.me)return;
  if(new Set(Object.values(ds.picks||{}).map(p=>p.teamId)).has(tid))return;
  const nc=cp+1;
  const up={[`picks/${cp}`]:{teamId:tid,playerId:S.me,auto:false,ts:Date.now()},currentPick:nc};
  if(nc<ds.totalPicks)up.timerEnd=Date.now()+timer*1000;
  db.ref(`groups/${S.gid}/draftState`).update(up);
  if(nc>=ds.totalPicks)db.ref(`groups/${S.gid}/status`).set("complete");
}

function pauseDraft(){const p=!S.group.draftState.paused,timer=S.group.timer||30;db.ref(`groups/${S.gid}/draftState`).update({paused:p,...(!p&&{timerEnd:Date.now()+timer*1000})});}
function finalize(){if(!confirm("Finalize draft? This locks picks and enables scoring."))return;db.ref(`groups/${S.gid}/status`).set("complete");}
function restartDraft(){
  if(!confirm("Restart draft? ALL picks will be erased."))return;

}

// ═══ ADMIN ═══
const MATCHUPS=[[1,16],[8,9],[5,12],[4,13],[6,11],[3,14],[7,10],[2,15]];

function rAdm(){
  const g=S.group,res=GRES;
  const rounds=[
    {n:"Round of 64",k:1,getMatchups:reg=>{
      const rt=T.filter(t=>t.region===reg);
      return MATCHUPS.map(([s1,s2])=>[rt.find(t=>t.seed===s1),rt.find(t=>t.seed===s2)]).filter(([a,b])=>a&&b);
    }},
    {n:"Round of 32",k:2,getMatchups:reg=>{
      // Winners of R64 paired: 1/16 winner vs 8/9 winner, 5/12 vs 4/13, 6/11 vs 3/14, 7/10 vs 2/15
      const rt=T.filter(t=>t.region===reg);
      const r64w=MATCHUPS.map(([s1,s2])=>{
        const t1=rt.find(t=>t.seed===s1),t2=rt.find(t=>t.seed===s2);
        if(res[`${t1?.id}_r1`])return t1;if(res[`${t2?.id}_r1`])return t2;return null;
      });
      return [[0,1],[2,3],[4,5],[6,7]].map(([a,b])=>[r64w[a],r64w[b]]).filter(([a,b])=>a&&b);
    }},
    {n:"Sweet 16",k:3,getMatchups:reg=>{
      const prev=T.filter(t=>t.region===reg&&res[`${t.id}_r2`]);
      if(prev.length<2)return[];
      const pairs=[];for(let i=0;i<prev.length;i+=2)if(prev[i+1])pairs.push([prev[i],prev[i+1]]);
      return pairs;
    }},
    {n:"Elite 8",k:4,getMatchups:reg=>{
      const prev=T.filter(t=>t.region===reg&&res[`${t.id}_r3`]);
      if(prev.length<2)return[];
      return [[prev[0],prev[1]]];
    }},
  ];

  let h=`<div class="adm-panel"><div class="adm-h">Admin — Enter Results</div><div class="adm-sub">Click the winning team. Loser is auto-eliminated.</div>`;
  
  rounds.forEach(r=>{
    h+=`<div class="adm-rd"><h3>${r.n} (&times;${RM[r.k]})</h3>`;
    R.forEach(reg=>{
      const mus=r.getMatchups(reg);
      if(!mus.length)return;
      h+=`<div style="font-size:.58rem;color:var(--g1);margin:.2rem 0 .1rem;font-weight:600">${reg}</div>`;
      mus.forEach(([t1,t2])=>{
        if(!t1||!t2)return;
        const w1=res[`${t1.id}_r${r.k}`],w2=res[`${t2.id}_r${r.k}`];
        const decided=w1||w2;
        h+=`<div class="adm-mu">`;
        h+=`<div class="am-team ${w1?'won':''} ${w2?'lost':''}" onclick="${decided?'':`recMU('${t1.id}','${t2.id}',${r.k})`}"><span class="ams">${t1.seed}</span><span class="amn">${t1.name}</span><span class="amp">${SP[t1.seed]*(RM[r.k]||1)}</span></div>`;
        h+=`<div class="am-vs">vs</div>`;
        h+=`<div class="am-team ${w2?'won':''} ${w1?'lost':''}" onclick="${decided?'':`recMU('${t2.id}','${t1.id}',${r.k})`}"><span class="ams">${t2.seed}</span><span class="amn">${t2.name}</span><span class="amp">${SP[t2.seed]*(RM[r.k]||1)}</span></div>`;
        if(decided)h+=`<button class="adm-undo" onclick="undoMU('${t1.id}','${t2.id}',${r.k})">undo</button>`;
        h+=`</div>`;
      });
    });
    h+=`</div>`;
  });
  
  // Final Four and Championship (cross-region)
  const e8winners=T.filter(t=>res[`${t.id}_r4`]);
  if(e8winners.length>=2){
    h+=`<div class="adm-rd"><h3>Final Four (&times;${RM[5]})</h3>`;
    for(let i=0;i<e8winners.length;i+=2){
      if(!e8winners[i+1])break;
      const t1=e8winners[i],t2=e8winners[i+1];
      const w1=res[`${t1.id}_r5`],w2=res[`${t2.id}_r5`],decided=w1||w2;
      h+=`<div class="adm-mu">`;
      h+=`<div class="am-team ${w1?'won':''} ${w2?'lost':''}" onclick="${decided?'':`recMU('${t1.id}','${t2.id}',5)`}"><span class="ams">${t1.seed}</span><span class="amn">${t1.name}</span></div>`;
      h+=`<div class="am-vs">vs</div>`;
      h+=`<div class="am-team ${w2?'won':''} ${w1?'lost':''}" onclick="${decided?'':`recMU('${t2.id}','${t1.id}',5)`}"><span class="ams">${t2.seed}</span><span class="amn">${t2.name}</span></div>`;
      if(decided)h+=`<button class="adm-undo" onclick="undoMU('${t1.id}','${t2.id}',5)">undo</button>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  
  const f4winners=T.filter(t=>res[`${t.id}_r5`]);
  if(f4winners.length>=2){
    h+=`<div class="adm-rd"><h3>Championship (&times;${RM[6]})</h3>`;
    const t1=f4winners[0],t2=f4winners[1];
    const w1=res[`${t1.id}_r6`],w2=res[`${t2.id}_r6`],decided=w1||w2;
    h+=`<div class="adm-mu">`;
    h+=`<div class="am-team ${w1?'won':''} ${w2?'lost':''}" onclick="${decided?'':`recMU('${t1.id}','${t2.id}',6)`}"><span class="ams">${t1.seed}</span><span class="amn">${t1.name}</span></div>`;
    h+=`<div class="am-vs">vs</div>`;
    h+=`<div class="am-team ${w2?'won':''} ${w1?'lost':''}" onclick="${decided?'':`recMU('${t2.id}','${t1.id}',6)`}"><span class="ams">${t2.seed}</span><span class="amn">${t2.name}</span></div>`;
    if(decided)h+=`<button class="adm-undo" onclick="undoMU('${t1.id}','${t2.id}',6)">undo</button>`;
    h+=`</div>`;
    h+=`</div>`;
  }
  
  h+=`</div>`;document.getElementById("p-adm").innerHTML=h;
}

function recMU(winnerId,loserId,round){
  const updates={};
  updates[`${winnerId}_r${round}`]=true;
  updates[`${loserId}_elim`]=true;
  db.ref("results").update(updates);
}

function undoMU(t1id,t2id,round){
  if(!confirm("Undo this result?"))return;
  const updates={};
  updates[`${t1id}_r${round}`]=null;
  updates[`${t2id}_r${round}`]=null;
  updates[`${t1id}_elim`]=null;
  updates[`${t2id}_elim`]=null;
  // Also clear any downstream results
  for(let r=round+1;r<=6;r++){
    updates[`${t1id}_r${r}`]=null;
    updates[`${t2id}_r${r}`]=null;
  }
  db.ref("results").update(updates);
}

  });
}

function switchGroup(gid){
  enterGroup(gid);
  S.tab="draft";
  render();
}

function joinFromGroupsTab(){
  const code=(document.getElementById("groupsJoinCode")?.value||"").trim().toUpperCase();
  if(code.length!==6)return alert("Enter a valid 6-letter code");
  const gid=code.toLowerCase();
  db.ref(`groups/${gid}`).once("value",snap=>{
    const g=snap.val();
    if(!g)return alert("Group not found.");
    if(g.status!=="waiting"&&!g.players?.[S.me])return alert("Draft already started.");
    const pc=Object.keys(g.players||{}).length;
    if(pc>=g.size&&!g.players?.[S.me])return alert("Group is full.");
    if(!g.players?.[S.me])db.ref(`groups/${gid}/players/${S.me}`).set({name:S.myName,joinedAt:Date.now(),order:pc});
    enterGroup(gid);
    S.tab="draft";
    render();
  });
}

// ═══ CHAT ═══
function sendChat(){
  const el=document.getElementById("chatMsg");
  if(!el||!el.value.trim())return;
  db.ref(`groups/${S.gid}/chat`).push({name:S.myName,text:el.value.trim(),ts:Date.now()});
  el.value="";
}

function listenChat(){
  if(!S.gid)return;
  db.ref(`groups/${S.gid}/chat`).orderByChild("ts").limitToLast(50).on("value",snap=>{
    const box=document.getElementById("chatBox");
    if(!box)return;
    const msgs=snap.val();
    if(!msgs){box.innerHTML=`<div class="empty" style="font-size:.65rem;padding:.3rem">No messages yet</div>`;return;}
    let h="";
    Object.values(msgs).sort((a,b)=>a.ts-b.ts).forEach(m=>{
      h+=`<div class="chat-msg"><span class="cm-name">${m.name}</span><span class="cm-text">${m.text.replace(/</g,'&lt;')}</span></div>`;
    });
    box.innerHTML=h;
    box.scrollTop=box.scrollHeight;
  });
}

// ═══ INIT ═══
S.myName=localStorage.getItem("dg_name")||"";
renderGate();
</script>
</body>
</html>
